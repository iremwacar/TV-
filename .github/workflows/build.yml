name: Build Mac App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-packager . "TV-Plus-Big-Screen" --platform=darwin --arch=universal --icon=TV+icon.ico
      - name: Upload Artifact
        uses: actions/upload-artifact@v4  # İşte burayı v4 yaptık!
        with:
          name: TV-Plus-Mac-App
          path: TV-Plus-Big-Screen-darwin-universal/
